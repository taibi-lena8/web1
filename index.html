<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متوسطة مرخوفي حسين | البوابة الإلكترونية</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="top">
  <div class="logo">
    <svg class="logo-svg" viewBox="0 0 100 100">
      <text x="50%" y="65%" text-anchor="middle" font-size="60" font-family="Segoe Script, cursive" fill="#a12c4a">M</text>
    </svg>
    <div class="school">
      <h1>متوسطة مرخوفي حسين</h1>
      <span>Merkhofi Hussein Middle School</span>
    </div>
  </div>
  <div class="email-display">taibilena8@gmail.com</div>
</header>

<main class="container">
  <section class="card final-promo-box">
     <div class="promo-wrapper">
        <div id="plus-btn-access" class="final-plus-btn">+</div>
        <div class="final-arrow-down">
           <svg viewBox="0 0 50 80" width="40">
              <path d="M25,5 L25,70 M10,55 L25,72 L40,55" fill="none" stroke="#a12c4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
           </svg>
        </div>
        <button id="open-excel-portal" class="btn-main-excel">📥 تحميل قوائم الحجز (خاص بالأساتذة)</button>
     </div>
  </section>

  <section class="card">
    <h2>📩 اتصل بنا</h2>
    <form id="contact-form">
      <input type="text" name="from_name" placeholder="الاسم الكامل" required>
      <input type="email" name="reply_to" placeholder="البريد الإلكتروني" required>
      <textarea name="message" placeholder="رسالتك هنا..." rows="4" required></textarea>
      <button type="submit" id="contact-btn">إرسال</button>
    </form>
    <p id="contact-status" class="status-msg"></p>
  </section>
</main>

<div id="excel-modal" class="modal-overlay">
  <div class="modal-content">
    <div id="auth-step">
      <h3>🔒 كلمة المرور</h3>
      <input type="password" id="pass-field" placeholder="أدخل كلمة المرور">
      <div class="modal-btns">
        <button onclick="verifyPass()">دخول</button>
        <button onclick="closeModal()" class="btn-secondary">إلغاء</button>
      </div>
    </div>
    
    <div id="download-step" style="display:none;">
      <h3>📋 اختر اسمك لتحميل الملف</h3>
      <div class="teachers-list-container">
          
          <div class="subject-group">اللغة العربية</div>
          <label class="teacher-item"><input type="radio" name="teacher" value="zahi.xlsx"> الزاهي فاطمة الزهرة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="maazouz.xlsx"> معزوز صبيحة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="bouatrous.xlsx"> بوتروس سهام</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="maamri_i.xlsx"> معمري اكرام</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="omran.xlsx"> عمران فائزة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="khalifa.xlsx"> خليفة سامية</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="meflah.xlsx"> مفلاح أم كلثوم</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="chtibi.xlsx"> شطيبي نسيبة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="rouai.xlsx"> رواي سندس</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="raach.xlsx"> رعاش سارة</label>

          <div class="subject-group">اللغة الفرنسية</div>
          <label class="teacher-item"><input type="radio" name="teacher" value="boukadir.xlsx"> بوقادير ليلى</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="rahim.xlsx"> رحيم نور الهدى</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="ouadi.xlsx"> عوادي ايمان</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="maamri_s.xlsx"> معمري سوسن</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="khadia.xlsx"> خدية كريمة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="ben_soliman.xlsx"> بن سليمان ايمان</label>

          <div class="subject-group">اللغة الإنجليزية</div>
          <label class="teacher-item"><input type="radio" name="teacher" value="fatni.xlsx"> فتني زهرة العلاء</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="boutaba.xlsx"> بوطبة ليلى</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="kamassi.xlsx"> كماسي سعيدة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="fathallah.xlsx"> فتح الله نوال</label>

          <div class="subject-group">الرياضيات</div>
          <label class="teacher-item"><input type="radio" name="teacher" value="lakhchine.xlsx"> لخشين علي</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="ben_kouider.xlsx"> بن قويدر صبرينة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="ben_zid.xlsx"> بن زيد فاطمة الزهرة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="ramdani.xlsx"> رمضاني ام الهناء</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="tahra.xlsx"> طاهرة خولة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="berkibia.xlsx"> بركيبية احلام</label>

          <div class="subject-group">العلوم الطبيعية</div>
          <label class="teacher-item"><input type="radio" name="teacher" value="ait_yousad.xlsx"> ايت يسعد عبد الرزاق</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="miata.xlsx"> مياطة منيرة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="bouzid.xlsx"> بوزيد عائشة</label>

          <div class="subject-group">العلوم الفيزيائية</div>
          <label class="teacher-item"><input type="radio" name="teacher" value="boukri.xlsx"> بوكري بوبكر</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="barakat.xlsx"> بركات سيف الدين</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="maamri_f.xlsx"> معمري فاطمة الزهرة</label>

          <div class="subject-group">مواد أخرى</div>
          <label class="teacher-item"><input type="radio" name="teacher" value="osmani.xlsx"> عصماني عشورة</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="said.xlsx"> سعيد خلود</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="bouliga.xlsx"> بوليقة هاجر</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="tardjman.xlsx"> ترجمان علاء الدين</label>
          <label class="teacher-item"><input type="radio" name="teacher" value="djebah.xlsx"> جباح مصطفى</label>
      </div>

      <div class="modal-btns">
        <button onclick="doDownload()" class="btn-success">✅ تحميل الملف</button>
        <button onclick="closeModal()" class="btn-danger">إغلاق</button>
      </div>
    </div>
  </div>
</div>

<footer><p>© 2026 متوسطة مرخوفي حسين</p></footer>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="script.js"></script>
</body>
</html>
